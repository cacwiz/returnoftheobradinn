<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBRA DRAW</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --fg: #c8c890;
    --fg-dim: #8a8a50;
    --fg-faint: #4a4a28;
    --bg: #0a0a00;
    --bg-mid: #0d0d04;
    --border: #2a2a10;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
    color: var(--fg);
  }

  #app {
    display: flex;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
  }

  /* ── Header ── */
  #header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    height: 42px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    z-index: 10;
  }

  #logo {
    font-size: 13px;
    letter-spacing: 0.35em;
    color: var(--fg);
    text-transform: uppercase;
    user-select: none;
  }

  #logo span {
    color: var(--fg-dim);
    font-size: 10px;
    letter-spacing: 0.15em;
    margin-left: 12px;
  }

  /* ── Main layout ── */
  #main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    flex-shrink: 0;
    width: 200px;
    background: var(--bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 14px 14px;
    gap: 20px;
    overflow-y: auto;
    z-index: 10;
  }

  .section-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--fg-faint);
    margin-bottom: 8px;
  }

  .control-row {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .control-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .control-name {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--fg-dim);
    text-transform: uppercase;
  }

  .control-val {
    font-size: 10px;
    color: var(--fg);
    min-width: 28px;
    text-align: right;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 10px;
    background: var(--fg);
    cursor: pointer;
  }

  input[type=range]::-moz-range-thumb {
    width: 10px;
    height: 10px;
    background: var(--fg);
    border: none;
    cursor: pointer;
  }

  .divider {
    height: 1px;
    background: var(--border);
  }

  /* Tool buttons */
  .btn-group {
    display: flex;
    gap: 4px;
  }

  .tool-btn {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg-dim);
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    padding: 6px 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.08s;
    text-align: center;
  }

  .tool-btn:hover {
    border-color: var(--fg-dim);
    color: var(--fg);
  }

  .tool-btn.active {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }

  .clear-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg-faint);
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    padding: 7px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.08s;
  }

  .clear-btn:hover {
    border-color: #c84040;
    color: #c84040;
  }

  .save-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--fg-dim);
    color: var(--fg-dim);
    font-family: 'Courier New', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    padding: 7px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.08s;
  }

  .save-btn:hover {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }

  /* ── Canvas area ── */
  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: crosshair;
  }

  #canvas-wrap canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    image-rendering: pixelated;
  }

  #weave-canvas { pointer-events: none; }
  #dither-canvas { pointer-events: none; }

  /* ── Status bar ── */
  #statusbar {
    flex-shrink: 0;
    height: 24px;
    display: flex;
    align-items: center;
    padding: 0 18px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    gap: 24px;
  }

  .status-item {
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--fg-faint);
    text-transform: uppercase;
  }

  #status-msg { color: var(--fg-dim); }

  /* ── Cursor crosshair ── */
  #cursor-ring {
    position: fixed;
    border: 1px solid rgba(200,200,140,0.6);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    display: none;
    z-index: 999;
  }
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div id="logo">Obra Draw <span>/ 1-bit dither engine</span></div>
    <div style="font-size:9px;letter-spacing:0.2em;color:var(--fg-faint);text-transform:uppercase;">draw anything</div>
  </div>

  <div id="main">
    <div id="sidebar">

      <div>
        <div class="section-label">Tool</div>
        <div class="btn-group">
          <button class="tool-btn active" id="btn-draw">Draw</button>
          <button class="tool-btn" id="btn-erase">Erase</button>
        </div>
      </div>

      <div>
        <div class="section-label">Brush</div>
        <div class="control-row">
          <div class="control-header">
            <span class="control-name">Size</span>
            <span class="control-val" id="val-brush">6</span>
          </div>
          <input type="range" id="brush-size" min="1" max="40" value="6" step="1">
        </div>
        <div class="control-row" style="margin-top:10px">
          <div class="control-header">
            <span class="control-name">Opacity</span>
            <span class="control-val" id="val-opacity">95</span>
          </div>
          <input type="range" id="brush-opacity" min="10" max="100" value="95" step="1">
        </div>
      </div>

      <div class="divider"></div>

      <div>
        <div class="section-label">Dither</div>
        <div class="control-row">
          <div class="control-header">
            <span class="control-name">Threshold</span>
            <span class="control-val" id="val-threshold">50</span>
          </div>
          <input type="range" id="dither-threshold" min="0" max="100" value="50" step="1">
        </div>
        <div class="control-row" style="margin-top:10px">
          <div class="control-header">
            <span class="control-name">Midtone</span>
            <span class="control-val" id="val-midtone">45</span>
          </div>
          <input type="range" id="dither-midtone" min="0" max="100" value="45" step="1">
        </div>
      </div>

      <div class="divider"></div>

      <div>
        <div class="section-label">CRT / Weave</div>
        <div class="control-row">
          <div class="control-header">
            <span class="control-name">Wobble</span>
            <span class="control-val" id="val-wobble">80</span>
          </div>
          <input type="range" id="weave-wobble" min="0" max="200" value="80" step="1">
        </div>
        <div class="control-row" style="margin-top:10px">
          <div class="control-header">
            <span class="control-name">Speed</span>
            <span class="control-val" id="val-speed">40</span>
          </div>
          <input type="range" id="weave-speed" min="1" max="200" value="40" step="1">
        </div>
        <div class="control-row" style="margin-top:10px">
          <div class="control-header">
            <span class="control-name">Jitter</span>
            <span class="control-val" id="val-jitter">97</span>
          </div>
          <input type="range" id="weave-jitter" min="0" max="100" value="97" step="1">
        </div>
        <div class="control-row" style="margin-top:10px">
          <div class="control-header">
            <span class="control-name">Scanlines</span>
            <span class="control-val" id="val-scanlines">10</span>
          </div>
          <input type="range" id="weave-scanlines" min="0" max="60" value="10" step="1">
        </div>
        <div class="control-row" style="margin-top:10px">
          <div class="control-header">
            <span class="control-name">Flicker</span>
            <span class="control-val" id="val-flicker">2</span>
          </div>
          <input type="range" id="weave-flicker" min="0" max="100" value="2" step="1">
        </div>
      </div>

      <div class="divider"></div>

      <div style="display:flex;flex-direction:column;gap:6px">
        <button class="save-btn" id="btn-save">Save PNG</button>
        <button class="clear-btn" id="btn-clear">Clear Canvas</button>
      </div>

    </div>

    <div id="canvas-wrap">
      <canvas id="bg-canvas"></canvas>
      <canvas id="draw-canvas"></canvas>
      <canvas id="dither-canvas"></canvas>
      <canvas id="weave-canvas"></canvas>
    </div>
  </div>

  <div id="statusbar">
    <span class="status-item" id="status-pos">x:0 y:0</span>
    <span class="status-item" id="status-msg">ready — draw to inscribe your fate</span>
  </div>
</div>

<div id="cursor-ring"></div>

<script>
const bgCanvas     = document.getElementById('bg-canvas');
const drawCanvas   = document.getElementById('draw-canvas');
const ditherCanvas = document.getElementById('dither-canvas');
const weaveCanvas  = document.getElementById('weave-canvas');
const wrap         = document.getElementById('canvas-wrap');
const cursorRing   = document.getElementById('cursor-ring');

const bgCtx     = bgCanvas.getContext('2d');
const drawCtx   = drawCanvas.getContext('2d');
const ditherCtx = ditherCanvas.getContext('2d');
const weaveCtx  = weaveCanvas.getContext('2d');

let W, H;
let isDrawing = false;
let lastX = 0, lastY = 0;
let mode = 'draw';

// Params
let p = {
  brushSize: 6,
  brushOpacity: 0.95,
  ditherThreshold: 0.5,
  ditherMidtone: 0.45,
  wobble: 0.8,
  speed: 0.4,
  jitter: 0.97,
  scanlines: 0.10,
  flicker: 0.02
};

const bayer4 = [
  [ 0, 8, 2,10],
  [12, 4,14, 6],
  [ 3,11, 1, 9],
  [15, 7,13, 5]
];

// Row phases for gate weave
const rowPhases = new Float32Array(4000).map(() => Math.random() * Math.PI * 2);
let weaveTime = 0;
let weaveOffscreen = null;

// ── Resize ──────────────────────────────────────────────────────────────
function resize() {
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  [bgCanvas, drawCanvas, ditherCanvas, weaveCanvas].forEach(c => {
    c.width = W; c.height = H;
  });
  drawBackground();
  applyDither();
}

// ── Background ──────────────────────────────────────────────────────────
function drawBackground() {
  bgCtx.fillStyle = '#0d0d04';
  bgCtx.fillRect(0, 0, W, H);
  for (let i = 0; i < Math.floor(W * H * 0.003); i++) {
    bgCtx.fillStyle = `rgba(200,200,140,${Math.random()*0.12+0.02})`;
    bgCtx.fillRect(Math.floor(Math.random()*W), Math.floor(Math.random()*H), 1, 1);
  }
  bgCtx.strokeStyle = 'rgba(200,200,140,0.04)';
  bgCtx.lineWidth = 1;
  for (let y = 0; y < H; y += 48) {
    bgCtx.beginPath(); bgCtx.moveTo(0, y); bgCtx.lineTo(W, y); bgCtx.stroke();
  }
}

// ── Dither ──────────────────────────────────────────────────────────────
function applyDither() {
  const src = drawCtx.getImageData(0, 0, W, H);
  const out = ditherCtx.createImageData(W, H);
  const d = src.data, o = out.data;
  const bgR=13,bgG=13,bgB=4;
  const fgR=200,fgG=200,fgB=144;
  const thr = p.ditherThreshold;
  const mid = p.ditherMidtone / 100;

  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = (y*W+x)*4;
      const a = d[i+3];
      if (a === 0) { o[i+3]=0; continue; }
      const gray = (d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114) / 255;
      const combined = gray * (a/255);
      const threshold = (bayer4[y%4][x%4] / 16) * thr * 2;
      let r,g,b,oa;
      if (combined > threshold) {
        r=fgR; g=fgG; b=fgB; oa=255;
      } else if (combined > threshold * (1 - mid)) {
        r=Math.round(bgR+(fgR-bgR)*mid);
        g=Math.round(bgG+(fgG-bgG)*mid);
        b=Math.round(bgB+(fgB-bgB)*mid);
        oa=255;
      } else { r=g=b=oa=0; }
      o[i]=r; o[i+1]=g; o[i+2]=b; o[i+3]=oa;
    }
  }
  ditherCtx.putImageData(out, 0, 0);
}

let ditherTimer = null;
function scheduleDither() {
  clearTimeout(ditherTimer);
  ditherTimer = setTimeout(applyDither, 60);
}

// ── Gate weave animation ─────────────────────────────────────────────────
function animateWeave(ts) {
  requestAnimationFrame(animateWeave);
  weaveTime = ts * 0.001;

  weaveCtx.clearRect(0, 0, W, H);

  if (!weaveOffscreen || weaveOffscreen.width !== W || weaveOffscreen.height !== H) {
    weaveOffscreen = new OffscreenCanvas(W, H);
  }
  const oCtx = weaveOffscreen.getContext('2d');
  oCtx.clearRect(0, 0, W, H);
  oCtx.drawImage(bgCanvas, 0, 0);
  oCtx.drawImage(ditherCanvas, 0, 0);

  const wobbleAmt = p.wobble;
  const speedMult = p.speed;

  if (wobbleAmt < 0.01) {
    weaveCtx.drawImage(weaveOffscreen, 0, 0);
  } else {
    const src = oCtx.getImageData(0, 0, W, H);
    const dst = weaveCtx.createImageData(W, H);
    const s = src.data, ddat = dst.data;

    const globalDrift = Math.sin(weaveTime * speedMult * 0.3) * wobbleAmt * 0.6;

    for (let y = 0; y < H; y++) {
      const phase = rowPhases[y] + weaveTime * speedMult * (0.4 + (y%7)*0.03);
      const rowOff = Math.round(
        globalDrift
        + Math.sin(phase) * wobbleAmt * 0.8
        + Math.sin(phase*2.3+1.1) * wobbleAmt * 0.3
      );

      const jitterThresh = p.jitter;
      const jitterLine = Math.floor((weaveTime * speedMult * 0.7) % H);
      const jitter = (Math.abs(y - jitterLine) < 2 && Math.random() > jitterThresh)
        ? Math.round((Math.random()-0.5) * wobbleAmt * 4)
        : 0;

      const shift = rowOff + jitter;

      for (let x = 0; x < W; x++) {
        const srcX = ((x - shift) % W + W) % W;
        const si = (y*W+srcX)*4;
        const di = (y*W+x)*4;
        ddat[di]=s[si]; ddat[di+1]=s[si+1]; ddat[di+2]=s[si+2]; ddat[di+3]=s[si+3];
      }
    }
    weaveCtx.putImageData(dst, 0, 0);
  }

  // Scanlines
  if (p.scanlines > 0.005) {
    const scanAlpha = p.scanlines + Math.sin(weaveTime*0.15)*0.03;
    weaveCtx.fillStyle = `rgba(0,0,0,${Math.max(0,scanAlpha)})`;
    for (let y = 0; y < H; y += 2) weaveCtx.fillRect(0, y, W, 1);
  }

  // Flicker
  if (p.flicker > 0 && Math.random() > (1 - p.flicker * 0.005)) {
    weaveCtx.fillStyle = 'rgba(200,200,100,0.04)';
    weaveCtx.fillRect(0, 0, W, H);
  }
}

bgCanvas.style.display = 'none';
ditherCanvas.style.display = 'none';

// ── Drawing ──────────────────────────────────────────────────────────────
function getPos(e) {
  const rect = wrap.getBoundingClientRect();
  if (e.touches) return [e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top];
  return [e.clientX - rect.left, e.clientY - rect.top];
}

function startDraw(e) {
  isDrawing = true;
  [lastX, lastY] = getPos(e);
  e.preventDefault();
}

function draw(e) {
  if (!isDrawing) return;
  e.preventDefault();
  const [x, y] = getPos(e);
  drawCtx.lineWidth = p.brushSize;
  drawCtx.lineCap = 'round';
  drawCtx.lineJoin = 'round';
  if (mode === 'erase') {
    drawCtx.globalCompositeOperation = 'destination-out';
    drawCtx.strokeStyle = 'rgba(0,0,0,1)';
  } else {
    drawCtx.globalCompositeOperation = 'source-over';
    drawCtx.strokeStyle = `rgba(255,255,200,${p.brushOpacity})`;
  }
  drawCtx.beginPath();
  drawCtx.moveTo(lastX, lastY);
  drawCtx.lineTo(x, y);
  drawCtx.stroke();
  lastX = x; lastY = y;
  scheduleDither();
}

function endDraw() { isDrawing = false; applyDither(); }

wrap.addEventListener('mousedown', startDraw);
wrap.addEventListener('mousemove', draw);
wrap.addEventListener('mouseup', endDraw);
wrap.addEventListener('mouseleave', endDraw);
wrap.addEventListener('touchstart', startDraw, {passive:false});
wrap.addEventListener('touchmove', draw, {passive:false});
wrap.addEventListener('touchend', endDraw);

// ── Cursor ring ──────────────────────────────────────────────────────────
wrap.addEventListener('mousemove', e => {
  cursorRing.style.display = 'block';
  const size = p.brushSize;
  cursorRing.style.width = size + 'px';
  cursorRing.style.height = size + 'px';
  cursorRing.style.left = e.clientX + 'px';
  cursorRing.style.top = e.clientY + 'px';
  document.getElementById('status-pos').textContent =
    `x:${Math.round(e.clientX - wrap.getBoundingClientRect().left)} y:${Math.round(e.clientY - wrap.getBoundingClientRect().top)}`;
});
wrap.addEventListener('mouseleave', () => { cursorRing.style.display = 'none'; });

// ── Slider wiring ────────────────────────────────────────────────────────
function wire(id, valId, key, transform, redither) {
  const el = document.getElementById(id);
  const val = document.getElementById(valId);
  el.addEventListener('input', () => {
    const v = parseFloat(el.value);
    p[key] = transform ? transform(v) : v;
    val.textContent = Math.round(v);
    if (redither) scheduleDither();
  });
}

wire('brush-size',       'val-brush',      'brushSize',      null,          false);
wire('brush-opacity',    'val-opacity',    'brushOpacity',   v => v/100,    false);
wire('dither-threshold', 'val-threshold',  'ditherThreshold',v => v/100,    true);
wire('dither-midtone',   'val-midtone',    'ditherMidtone',  null,          true);
wire('weave-wobble',     'val-wobble',     'wobble',         v => v/100,    false);
wire('weave-speed',      'val-speed',      'speed',          v => v/100,    false);
wire('weave-jitter',     'val-jitter',     'jitter',         v => v/100,    false);
wire('weave-scanlines',  'val-scanlines',  'scanlines',      v => v/100,    false);
wire('weave-flicker',    'val-flicker',    'flicker',        null,          false);

// ── Buttons ──────────────────────────────────────────────────────────────
document.getElementById('btn-draw').addEventListener('click', () => {
  mode = 'draw';
  document.getElementById('btn-draw').classList.add('active');
  document.getElementById('btn-erase').classList.remove('active');
  document.getElementById('status-msg').textContent = 'draw mode';
});
document.getElementById('btn-erase').addEventListener('click', () => {
  mode = 'erase';
  document.getElementById('btn-erase').classList.add('active');
  document.getElementById('btn-draw').classList.remove('active');
  document.getElementById('status-msg').textContent = 'erase mode';
});
document.getElementById('btn-clear').addEventListener('click', () => {
  drawCtx.clearRect(0, 0, W, H);
  ditherCtx.clearRect(0, 0, W, H);
  document.getElementById('status-msg').textContent = 'canvas cleared';
});

document.getElementById('btn-save').addEventListener('click', () => {
  // Composite bg + weave into a save canvas
  const saveCanvas = document.createElement('canvas');
  saveCanvas.width = W; saveCanvas.height = H;
  const sCtx = saveCanvas.getContext('2d');
  sCtx.drawImage(bgCanvas, 0, 0);
  sCtx.drawImage(weaveCanvas, 0, 0);
  const link = document.createElement('a');
  link.download = 'obra-draw.png';
  link.href = saveCanvas.toDataURL('image/png');
  link.click();
  document.getElementById('status-msg').textContent = 'saved — your fate is recorded';
});

// ── Init ─────────────────────────────────────────────────────────────────
resize();
window.addEventListener('resize', resize);
requestAnimationFrame(animateWeave);
</script>
</body>
</html>
